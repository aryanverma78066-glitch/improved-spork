name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip and Setup
        run: |
          unzip game_project.zip
          # No need for chmod here, the docker container handles it differently

      - name: Build with Buildozer (Manual Docker)
        # We use the raw buildozer image to avoid the "user" permission bug
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostpython \
            kivy/buildozer \
            android debug
            
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: game-apk
          # Buildozer puts the APK in the bin/ folder of the root
          path: bin/*.apk
